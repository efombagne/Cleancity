<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Confirmer la clôture</title>
    <style>
        body { font-family: sans-serif; background: #f0fff4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .confirm-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 400px; }
        h2 { color: #22543d; }
        p { color: #4a5568; margin-bottom: 25px; }
        .btn-group { display: flex; gap: 10px; justify-content: center; }
        .btn { padding: 10px 20px; border-radius: 6px; text-decoration: none; font-weight: bold; border: none; cursor: pointer; }
        .btn-confirm { background: #38a169; color: white; }
        .btn-cancel { background: #edf2f7; color: #4a5568; }
    </style>
</head>
<body>

<div class="confirm-card">
    <div style="font-size: 50px;">🏁</div>
    <h2>Terminer la mission ?</h2>
    <p>Voulez-vous marquer la collecte <strong>#{{ collecte.id }}</strong> à <strong>{{ collecte.itineraire }}</strong> comme terminée ?</p>

    <form method="POST">
        {% csrf_token %}
        <div class="btn-group">
            <a href="{% url 'core:liste_collectes' %}" class="btn btn-cancel">Annuler</a>
            <button type="submit" class="btn btn-confirm">Oui, c'est fait !</button>
        </div>
    </form>
</div>

</body>
</html>
